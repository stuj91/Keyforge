<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minutes — Meeting Notes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --border: #e5e8ee;
    --text: #12151c;
    --text-soft: #6b7280;
    --text-faint: #9aa1ac;
    --accent: #2954a3;
    --accent-hover: #1f4184;
    --accent-soft: #eaf0fa;
    --blue: #2954a3;
    --blue-soft: #eaf0fa;
    --green: #157a4a;
    --green-soft: #e7f5ed;
    --amber: #a5620a;
    --amber-soft: #fbf0e0;
    --shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 1px 3px rgba(16, 24, 40, 0.06);
    --shadow-md: 0 4px 12px rgba(16, 24, 40, 0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 48px 20px 80px;
  }

  .page {
    max-width: 640px;
    margin: 0 auto;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-mark {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--accent);
    flex-shrink: 0;
  }

  .brand h1 {
    font-family: 'Manrope', sans-serif;
    font-size: 18px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -0.2px;
  }

  .brand p {
    font-size: 12.5px;
    color: var(--text-faint);
    margin: 0;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  .card.accent-blue { border-left: 3px solid var(--blue); }
  .card.accent-green { border-left: 3px solid var(--green); }
  .card.accent-amber { border-left: 3px solid var(--amber); }

  .card-divider {
    height: 1px;
    background: var(--border);
    margin: 22px 0 18px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .field-row:last-child { margin-bottom: 0; }

  .field { display: flex; flex-direction: column; gap: 7px; }
  .field.full { grid-column: 1 / -1; }

  label {
    font-family: 'Manrope', sans-serif;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text-soft);
  }

  input[type="text"], input[type="date"], textarea {
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    color: var(--text);
    background: #fbfbfc;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    width: 100%;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  input::placeholder, textarea::placeholder { color: var(--text-faint); }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
    background: #fff;
  }

  textarea {
    resize: vertical;
    min-height: 84px;
    line-height: 1.6;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 16px;
  }

  .section-icon {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .section-icon.blue { background: var(--blue-soft); }
  .section-icon.green { background: var(--green-soft); }
  .section-icon.amber { background: var(--amber-soft); }
  .section-icon svg { width: 14px; height: 14px; }

  .section-header h2 {
    font-family: 'Manrope', sans-serif;
    font-size: 14.5px;
    font-weight: 700;
    margin: 0;
  }

  .action-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .action-count {
    font-family: 'Manrope', sans-serif;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--amber);
    background: var(--amber-soft);
    padding: 3px 9px;
    border-radius: 20px;
  }

  .action-col-labels {
    display: grid;
    grid-template-columns: 1fr 1fr 130px 30px;
    gap: 8px;
    margin-bottom: 8px;
  }
  .action-col-labels span {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr 130px 30px;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }

  .action-row input { font-size: 13.5px; padding: 8px 10px; }

  .remove-row {
    background: transparent;
    border: none;
    color: var(--text-faint);
    font-size: 18px;
    cursor: pointer;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .remove-row:hover { background: #fdecec; color: #c0362f; }

  .add-row-btn {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: transparent;
    border: 1px dashed #c7d4e8;
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
    transition: background 0.15s ease;
  }
  .add-row-btn:hover { background: var(--accent-soft); }

  .generate-btn {
    width: 100%;
    font-family: 'Manrope', sans-serif;
    font-size: 14.5px;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 15px;
    cursor: pointer;
    margin: 8px 0 32px;
    box-shadow: var(--shadow-md);
    transition: background 0.15s ease, transform 0.05s ease;
  }
  .generate-btn:hover { background: var(--accent-hover); }
  .generate-btn:active { transform: scale(0.99); }

  .summary-wrap { display: none; }
  .summary-wrap.visible { display: block; }

  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 30px 28px;
    box-shadow: var(--shadow-md);
  }

  .summary-eyebrow {
    font-family: 'Manrope', sans-serif;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 8px;
  }

  .summary-card h2.summary-title {
    font-family: 'Manrope', sans-serif;
    font-size: 21px;
    font-weight: 800;
    margin: 0 0 6px;
    letter-spacing: -0.3px;
  }

  .summary-meta {
    font-size: 13px;
    color: var(--text-soft);
    margin: 0 0 22px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .summary-section { margin-bottom: 20px; }
  .summary-section:last-child { margin-bottom: 0; }

  .summary-section-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .summary-section-label.blue { color: var(--blue); }
  .summary-section-label.green { color: var(--green); }
  .summary-section-label.amber { color: var(--amber); }

  .summary-section-label .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .summary-section-label.blue .dot { background: var(--blue); }
  .summary-section-label.green .dot { background: var(--green); }
  .summary-section-label.amber .dot { background: var(--amber); }

  .summary-text {
    font-size: 14.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
  }

  .empty-note { color: var(--text-faint); font-size: 14px; }

  .copy-btn {
    display: block;
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 11px;
    cursor: pointer;
    margin-top: 22px;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .copy-btn:hover { background: #f6f7f9; border-color: #d0d5dd; }

  .copied-tag {
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--green);
    text-align: center;
    height: 14px;
    margin-top: 10px;
  }

  .summary-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .summary-table th {
    font-family: 'Manrope', sans-serif;
    font-size: 11.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--text-soft);
    text-align: left;
    padding: 0 10px 8px;
    border-bottom: 1.5px solid var(--border);
  }
  .summary-table td {
    padding: 10px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.5;
  }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-table td.who-cell {
    white-space: nowrap;
  }
  .who-tag {
    font-size: 12px;
    color: var(--amber);
    background: var(--amber-soft);
    padding: 2px 9px;
    border-radius: 20px;
    display: inline-block;
  }

  @media (max-width: 520px) {
    .field-row { grid-template-columns: 1fr; }
    .action-row, .action-col-labels { grid-template-columns: 1fr; }
    .action-col-labels { display: none; }
    .summary-table, .summary-table thead, .summary-table tbody, .summary-table tr, .summary-table td { display: block; width: 100%; }
    .summary-table th { display: none; }
    .summary-table td { border-bottom: none; padding: 4px 0; }
    .summary-table tr { padding: 10px 0; border-bottom: 1px solid var(--border); }
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
</head>
<body>

<div class="page">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>
        <h1>Minutes</h1>
        <p>Compose once, share anywhere</p>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="field-row">
      <div class="field full">
        <label for="meetingTitle">Meeting title</label>
        <input type="text" id="meetingTitle" placeholder="Q3 planning sync">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="meetingDate">Date</label>
        <input type="date" id="meetingDate">
      </div>
      <div class="field">
        <label for="attendees">Attendees</label>
        <input type="text" id="attendees" placeholder="Sam, Priya, Jordan">
      </div>
    </div>
  </div>

  <div class="card accent-blue">
    <div class="section-header">
      <div class="section-icon blue">
        <svg viewBox="0 0 24 24" fill="none" stroke="#2954a3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h2>Discussion &amp; decisions</h2>
    </div>
    <textarea id="discussion" placeholder="What was covered, key points raised, and what was decided..."></textarea>
  </div>

  <div class="card accent-amber">
    <div class="action-header">
      <div class="section-header" style="margin-bottom:0;">
        <div class="section-icon amber">
          <svg viewBox="0 0 24 24" fill="none" stroke="#a5620a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
        </div>
        <h2>Action Items</h2>
      </div>
      <span class="action-count" id="actionCount">2</span>
    </div>
    <div class="action-col-labels">
      <span>Discussion</span>
      <span>Action required</span>
      <span>Who</span>
      <span></span>
    </div>
    <div id="actionRows"></div>
    <button class="add-row-btn" id="addRowBtn">+ Add action item</button>
  </div>

  <button class="generate-btn" id="generateBtn">Generate summary</button>

  <div class="summary-wrap" id="summaryWrap">
    <div class="summary-card">
      <p class="summary-eyebrow">Meeting summary</p>
      <h2 class="summary-title" id="summaryTitle">Meeting title</h2>
      <p class="summary-meta" id="summaryMeta"></p>
      <div id="summaryContent"></div>
      <button class="copy-btn" id="exportBtn">Export summary (.docx)</button>
      <p class="copied-tag" id="copiedTag"></p>
    </div>
  </div>
</div>

<script>
  const actionRows = document.getElementById('actionRows');
  const addRowBtn = document.getElementById('addRowBtn');
  const actionCount = document.getElementById('actionCount');
  const generateBtn = document.getElementById('generateBtn');
  const summaryWrap = document.getElementById('summaryWrap');
  const summaryTitle = document.getElementById('summaryTitle');
  const summaryMeta = document.getElementById('summaryMeta');
  const summaryContent = document.getElementById('summaryContent');
  const exportBtn = document.getElementById('exportBtn');
  const copiedTag = document.getElementById('copiedTag');

  function updateActionCount() {
    actionCount.textContent = actionRows.querySelectorAll('.action-row').length;
  }

  function addActionRow(discussion = '', action = '', who = '') {
    const row = document.createElement('div');
    row.className = 'action-row';
    row.innerHTML = `
      <input type="text" class="discussion-input" placeholder="What was discussed" value="${discussion}">
      <input type="text" class="action-input" placeholder="What needs to happen" value="${action}">
      <input type="text" class="who-input" placeholder="Owner" value="${who}">
      <button class="remove-row" aria-label="Remove row">×</button>
    `;
    row.querySelector('.remove-row').addEventListener('click', () => { row.remove(); updateActionCount(); });
    actionRows.appendChild(row);
    updateActionCount();
  }

  addRowBtn.addEventListener('click', () => addActionRow());
  addActionRow();
  addActionRow();

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function generateSummary() {
    const title = document.getElementById('meetingTitle').value.trim() || 'Untitled meeting';
    const date = document.getElementById('meetingDate').value;
    const attendees = document.getElementById('attendees').value.trim();
    const discussion = document.getElementById('discussion').value.trim();

    const actions = Array.from(actionRows.querySelectorAll('.action-row')).map(row => ({
      discussion: row.querySelector('.discussion-input').value.trim(),
      action: row.querySelector('.action-input').value.trim(),
      who: row.querySelector('.who-input').value.trim()
    })).filter(a => a.discussion || a.action);

    summaryTitle.textContent = title;
    const metaParts = [];
    if (date) metaParts.push(formatDate(date));
    if (attendees) metaParts.push('Attendees: ' + attendees);
    summaryMeta.textContent = metaParts.join('  ·  ');

    let html = '';

    if (discussion) {
      html += `<div class="summary-section"><p class="summary-section-label blue"><span class="dot"></span>Discussion &amp; decisions</p><div class="summary-text">${escapeHtml(discussion)}</div></div>`;
    }
    if (actions.length) {
      html += `<div class="summary-section"><p class="summary-section-label amber"><span class="dot"></span>Action items</p>`;
      html += `<table class="summary-table"><thead><tr><th>Discussion</th><th>Action required</th><th>Who</th></tr></thead><tbody>`;
      actions.forEach(a => {
        const whoHtml = a.who ? `<span class="who-tag">${escapeHtml(a.who)}</span>` : '';
        html += `<tr><td>${escapeHtml(a.discussion)}</td><td>${escapeHtml(a.action)}</td><td class="who-cell">${whoHtml}</td></tr>`;
      });
      html += `</tbody></table></div>`;
    }

    if (!discussion && !actions.length) {
      html = '<p class="empty-note">Nothing recorded yet.</p>';
    }

    summaryContent.innerHTML = html;
    summaryWrap.dataset.summaryData = JSON.stringify({ title, metaLine: metaParts.join('  ·  '), discussion, actions });
    summaryWrap.classList.add('visible');
    summaryWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
    copiedTag.textContent = '';
  }

  generateBtn.addEventListener('click', generateSummary);

  exportBtn.addEventListener('click', async () => {
    const raw = summaryWrap.dataset.summaryData;
    if (!raw) return;
    const data = JSON.parse(raw);

    copiedTag.textContent = 'PREPARING DOCUMENT…';

    try {
      const { Document, Packer, Paragraph, TextRun, HeadingLevel, Table, TableRow, TableCell, WidthType, BorderStyle } = docx;

      const children = [];

      children.push(new Paragraph({
        heading: HeadingLevel.TITLE,
        children: [new TextRun({ text: data.title })]
      }));

      if (data.metaLine) {
        children.push(new Paragraph({
          spacing: { after: 300 },
          children: [new TextRun({ text: data.metaLine, color: '666666', size: 20 })]
        }));
      }

      if (data.discussion) {
        children.push(new Paragraph({
          heading: HeadingLevel.HEADING_2,
          spacing: { before: 200, after: 120 },
          children: [new TextRun({ text: 'Discussion & Decisions' })]
        }));
        data.discussion.split('\n').forEach(line => {
          if (line.trim()) {
            children.push(new Paragraph({ spacing: { after: 100 }, children: [new TextRun({ text: line })] }));
          }
        });
      }

      if (data.actions && data.actions.length) {
        children.push(new Paragraph({
          heading: HeadingLevel.HEADING_2,
          spacing: { before: 300, after: 120 },
          children: [new TextRun({ text: 'Action Items' })]
        }));

        const headerCell = (text) => new TableCell({
          shading: { fill: 'EAF0FA' },
          children: [new Paragraph({ children: [new TextRun({ text, bold: true })] })]
        });
        const bodyCell = (text) => new TableCell({
          children: [new Paragraph({ children: [new TextRun({ text: text || '' })] })]
        });

        const rows = [
          new TableRow({
            tableHeader: true,
            children: [headerCell('Discussion'), headerCell('Action required'), headerCell('Who')]
          }),
          ...data.actions.map(a => new TableRow({
            children: [bodyCell(a.discussion), bodyCell(a.action), bodyCell(a.who)]
          }))
        ];

        children.push(new Table({
          width: { size: 100, type: WidthType.PERCENTAGE },
          rows
        }));
      }

      const doc = new Document({
        sections: [{ properties: {}, children }]
      });

      const blob = await Packer.toBlob(doc);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const safeName = (data.title || 'meeting-summary').replace(/[^a-z0-9]+/gi, '-').toLowerCase();
      a.download = `${safeName}.docx`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      copiedTag.textContent = 'DOWNLOADED';
      setTimeout(() => { copiedTag.textContent = ''; }, 1800);
    } catch (e) {
      console.error(e);
      copiedTag.textContent = 'EXPORT FAILED — TRY AGAIN';
    }
  });
</script>

</body>
</html>
